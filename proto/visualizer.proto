syntax = "proto3";

package dmx_controller;

// Stored shader definition.
message Visualizer {
  string name = 1;
  string glsl_source = 2;
}

// Compilation result.
message VisualizerCompilationResult {
  bool success = 1;
  string error_message = 2;
  uint32 error_line = 3;
}

// Tree node for composing visualizers at render time.
message VisualizerNode {
  oneof node {
    uint64 leaf = 1;         // Shader ID (renders with shared uniforms).
    VisualizerLerp lerp = 2; // Blend two subtrees.
    VisualizerSequence sequence = 3; // Chain shaders.
    bool black_buffer = 4; // Constant black (presence matters, value ignored).
  }
}

// Render both subtrees, then blend pixels. t values include baked tile amounts
// for composition.
message VisualizerLerp {
  VisualizerNode a = 1;
  VisualizerNode b = 2;
  float t = 3; // 0.0 = fully A, 1.0 = fully B.
}

// Chain shaders: output of each becomes the input to the next.
message VisualizerSequence { repeated VisualizerNode nodes = 1; }
