syntax = "proto3";

package dmx_controller;

import "proto/audio.proto";
import "proto/beat.proto";
import "proto/controller.proto";
import "proto/effect.proto";
import "proto/fixture_definitions.proto";
import "proto/output.proto";
import "proto/scene.proto";
import "proto/settings.proto";
import "proto/show.proto";

message Project {
  message Assets {
    map<uint64, AudioFile> audio_files = 2;

    reserved 1; // repeated AudioFile deprecated_audio_files = 1 [ deprecated =
                // true ];
  }

  string name = 1;
  uint32 version = 2;
  Settings settings = 3;
  reserved 4 to 10;

  // Path descriptions
  uint64 active_patch = 18;
  map<uint64, Patch> patches = 40;
  FixtureDefinitions fixture_definitions = 43;
  map<uint64, TargetGroup> groups = 19;

  Assets assets = 21;

  map<uint64, Show> shows = 31;
  uint64 selected_show = 32;

  // Fixture sequence 0 is reserved for the "unset" sequence.
  map<uint64, Sequence> sequences = 33;

  // Scene 0 is reserved for the "unset" scene.
  map<uint64, Scene> scenes = 56;
  uint64 active_scene = 57;
  BeatMetadata prev_live_beat = 59;
  BeatMetadata live_beat = 53;
  uint64 beat_transition_start_ms = 60;
  uint64 beat_transition_duration_ms = 61;
  reserved 54; // last_controller_name

  ControllerMapping controller_mapping = 55;
  // Controller bindings for global live page context
  // Shared across all scenes (e.g., beat controls)
  ControllerBindingsMap live_page_controller_bindings = 58;

  // Name of the selected audio input device for audio-responsive effects.
  // Empty string means no device selected.
  string selected_audio_input = 62;

  reserved 52; // uint32 active_scene = 52;
  reserved 51; // repeated Scene scenes = 51;
  reserved 11; // uint32 update_frequency_ms = 11;
  reserved 12; // int32 timing_offset_ms = 12;
  reserved 14; // map<uint32, PhysicalDmxFixture> physical_fixtures = 14 [
               // deprecated = true ];
  reserved 41; // map<uint32, FixtureSequence> fixture_sequences = 41 [
               // deprecated = true ];
  reserved 16; // repeated DefaultChannelValues default_channel_values = 16 [
               // deprecated = true ];
  reserved 13; // map<uint32, DmxFixtureDefinition>
               // deprecated_uint32_fixture_definitions = 13 [ deprecated = true
               // ];
  reserved 15; // map<uint32, PhysicalFixtureGroup> physical_fixture_groups = 15
               // [ deprecated = true ];
  reserved 20; // map<uint64, DmxFixtureDefinition>
               // deprecated_uint64_fixture_definitions = 20;
  reserved 17; // map<uint64, Universe> universes = 17 [deprecated = true];
  reserved 22; // map<string, DmxFixtureDefinition> fixture_definitions = 22;
}
