syntax = "proto3";

package dmx_controller;

message Mapping2D {
  message SampleMapping {
    // Where to take the sample from
    uint32 min_width = 1;
    uint32 max_width = 2;
    uint32 min_height = 3;
    uint32 max_height = 4;

    // If the linear layout maps vertically or horizontally
    bool vertical = 5;

    // If the linear layout is serpentine.
    bool serpentine = 6;
  }

  uint32 width = 1;
  uint32 height = 2;

  repeated SampleMapping samples = 3;
}
