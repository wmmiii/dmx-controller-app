syntax = "proto3";

package dmx_controller;

import "proto/color.proto";
import "proto/effect.proto";
import "proto/output.proto";

message TimecodedShow {
  message AudioTrack { uint64 track_id = 1; }

  message Output {
    string name = 4;
    bool collapsed = 1;

    dmx_controller.OutputTarget output_target = 2;

    Layer layer = 3;
  }

  message PaletteKeyframe {
    dmx_controller.ColorPalette color_palette = 1;
    uint64 t = 2;
  }

  string name = 1;
  repeated PaletteKeyframe palettes = 5;
  dmx_controller.ColorPalette color_palette = 2 [ deprecated = true ];
  AudioTrack audio_track = 3;
  repeated Output outputs = 4;
}
