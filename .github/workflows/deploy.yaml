name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup
        uses: ./.github/setup

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

  deploy:
    name: Deploy

    needs: test

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup
        uses: ./.github/setup

      - name: Generate CSS variables
        run: pnpm run css-vars:build

      - name: Resolve symlinks for deployment
        run: |
          rm web/vars.css
          cp public/vars.css web/vars.css

      - name: Upload pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
